replicaSet:
  sections:
    resources:
      label: 'Resources'
      description: 'Configure the resources your new database will have access to.'
      components:
        nodes:
          uiType: group
          components:
            numberOfnodes:
              path: 'spec.components.engine.replicas'
              uiType: number
              fieldParams:
                label: 'Number of nodes'
              validation:
                required: true
                min: 1
                int: true
                celExpressions:
                  - celExpr: 'spec.components.engine.replicas % 2 == 1'
                    message: 'The number of nodes must be odd'

            resources:
              uiType: group
              groupType: line
              components:
                cpu:
                  path: 'spec.components.engine.resources.limits.cpu'
                  uiType: number
                  fieldParams:
                    label: 'CPU'
                    defaultValue: 1
                    step: 0.1
                  validation:
                    min: 0.6
                    required: true

                memory:
                  path: 'spec.components.engine.resources.limits.memory'
                  uiType: number
                  fieldParams:
                    label: 'Memory'
                    defaultValue: 4
                    step: 0.001
                    badge: 'Gi'
                    badgeToApi: true
                  validation:
                    min: 0.512
                    required: true

                disk:
                  path: 'spec.components.engine.storage.size'
                  uiType: number
                  fieldParams:
                    label: 'Disk'
                    defaultValue: 25
                    badge: 'Gi'
                    badgeToApi: true
                  validation:
                    min: 1
                    int: true
                    required: true
    advanced:
      label: 'Advanced configuration'
      description: 'Configure advanced settings for your database'
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: 'Storage class'
            defaultValue: 'local-path'
            options:
              - label: 'local-path'
                value: 'local-path'
        configuration:
          uiType: text
          path: spec.components.engine.configuration
          fieldParams:
            label: 'Advanced configuration'
            multiline: true
            minRows: 3
            maxRows: 8
      componentsOrder:
        - storageClass
        - configuration
  sectionsOrder:
    - databaseVersion
    - resources
    - advanced
sharded:
  sections:
    databaseVersion:
      label: 'Database Version'
      description: 'Provide the information about the database version you want to use.'
      components:
        version:
          uiType: select
          path: 'spec.engine.version'
          fieldParams:
            label: 'Database Version'
            optionsPath: 'spec.componentTypes.mongod.versions'
            optionsPathConfig:
              labelPath: 'version'
              valuePath: 'version'
          validation:
            required: true
    resources:
      label: 'Resources'
      description: 'Some description about resources'
      components:
        shards:
          uiType: number
          path: 'spec.sharding.shards'
          fieldParams:
            required: true
            label: 'Nº of shards'
            defaultValue: 1
        numberOfnodes:
          path: 'spec.components.engine.replicas'
          uiType: number
          fieldParams:
            label: 'Number of nodes'
            defaultValue: 3
          validation:
            required: true
            min: 1
            int: true
            celExpressions:
              - celExpr: 'spec.components.engine.replicas % 2 == 1'
                message: 'The number of nodes must be odd'
        nodesResources:
          uiType: group
          groupType: line
          components:
            cpu:
              path: 'spec.components.engine.resources.limits.cpu'
              uiType: number
              fieldParams:
                label: 'CPU'
                defaultValue: 1
                step: 0.1
              validation:
                min: 0.6
                required: true
            memory:
              path: 'spec.components.engine.resources.limits.memory'
              uiType: number
              fieldParams:
                label: 'Memory'
                defaultValue: 4
                step: 0.001
                badge: 'Gi'
                badgeToApi: true
              validation:
                min: 0.512
                required: true
            disk:
              path: 'spec.components.engine.storage.size'
              uiType: number
              fieldParams:
                label: 'Disk'
                defaultValue: 25
                badge: 'Gi'
                badgeToApi: true
                validation:
                  min: 1
                  int: true
                  required: true
        numberOfRouters:
          path: 'spec.components.proxy.replicas'
          uiType: number
          fieldParams:
            label: 'Number of routers'
        routersResources:
          uiType: group
          groupType: line
          components:
            cpu:
              path: 'spec.components.proxy.resources.limits.cpu'
              uiType: number
              fieldParams:
                label: 'CPU'
              validation:
                min: 1
                max: 10
            memory:
              path: 'spec.components.proxy.resources.limits.memory'
              uiType: number
              fieldParams:
                label: 'Memory'
              validation:
                min: 1
                max: 10
        numberOfConfigServers:
          uiType: number
          path: 'spec.components.configServer.replicas'
          fieldParams:
            label: 'Nº of configuration servers'
            defaultValue: 3
          validation:
            celExpressions:
              - celExpr: '!(spec.components.engine.replicas > 1 && spec.components.configServer.replicas == 1)'
                message: 'The number of configuration servers cannot be 1 if the number of database nodes is greater than 1'
      componentsOrder:
        - shards
        - numberOfnodes
        - nodesResources
        - numberOfRouters
        - routersResources
        - numberOfConfigServers
    advanced:
      label: 'Advanced configuration'
      description: 'Configure advanced settings for your database'
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: 'Storage class'
            defaultValue: 'local-path'
            options:
              - label: 'local-path'
                value: 'local-path'
        configuration:
          uiType: text
          path: spec.components.engine.configuration
          fieldParams:
            label: 'Advanced configuration'
            defaultValue: "operationProfiling:\n  mode: slowOp\n"
            multiline: true
            minRows: 3
            maxRows: 8
      componentsOrder:
        - storageClass
        - configuration
  sectionsOrder:
    - databaseVersion
    - resources
    - advanced
