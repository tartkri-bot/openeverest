---
name: 'Install Kubernetes Tools'
description: 'Installs Kubernetes-related CLI tools (kubectl, k3d, kuttl)'
inputs:
  tools-path:
    description: 'Tools path to install binaries'
    required: false
    default: '/opt/tools/bin'
  install-kubectl:
    description: 'Install Kubectl'
    required: false
    default: false
  kubectl-version:
    description: 'Kubectl version to install'
    required: false
    default: '1.29.5'
  install-k3d:
    description: 'Install K3D'
    required: false
    default: false
  k3d-version:
    description: 'K3D version to install'
    required: false
    default: '5.8.3'
  install-kuttl:
    description: 'Install kubectl-kuttl'
    required: false
    default: 'false'
  kuttl-version:
    description: 'kuttl version (without the leading v)'
    required: false
    default: '0.25.0'
runs:
  using: "composite"
  steps:
    - name: Install TOOLS_PATH
      run: |
        mkdir -p ${{ inputs.tools-path }}
        echo ${{ inputs.tools-path }} >> $GITHUB_PATH
      shell: bash

    - name: Install Kubectl
      if: ${{ inputs.install-kubectl == 'true' }}
      run: |
        curl -s -L -o ${{ inputs.tools-path }}/kubectl https://dl.k8s.io/release/v${{ inputs.kubectl-version }}/bin/linux/amd64/kubectl 
        chmod +x ${{ inputs.tools-path }}/kubectl
        kubectl version --client --output=yaml
      shell: bash

    - name: Install K3D
      if: ${{ inputs.install-k3d == 'true' }}
      run: |
        curl -s -L -o ${{ inputs.tools-path }}/k3d https://github.com/k3d-io/k3d/releases/download/v${{ inputs.k3d-version }}/k3d-linux-amd64
        chmod +x ${{ inputs.tools-path }}/k3d
        k3d version
      shell: bash

    - name: Install kuttl
      if: inputs.install-kuttl == 'true'
      shell: bash
      run: |
        # kuttl uses the raw uname -m naming: x86_64, arm64 (aarch64 → arm64).
        ARCH=$(uname -m | sed 's/aarch64/arm64/')
        VERSION="${{ inputs.kuttl-version }}"
        BASE="https://github.com/kudobuilder/kuttl/releases/download/v${VERSION}"
        BINARY="kubectl-kuttl_${VERSION}_linux_${ARCH}"
        DEST="${{ inputs.tools-path }}/kubectl-kuttl"

        curl -fsSL -o "${DEST}"                           "${BASE}/${BINARY}"
        curl -fsSL -o "/tmp/kuttl_checksums.txt"          "${BASE}/checksums.txt"
        grep "^.\{64\}  ${BINARY}$" /tmp/kuttl_checksums.txt \
          | awk -v dest="${DEST}" '{print $1 "  " dest}' \
          | sha256sum --check --status
        rm /tmp/kuttl_checksums.txt
        chmod +x "${DEST}"

        echo "$(kubectl kuttl --version) installed"
