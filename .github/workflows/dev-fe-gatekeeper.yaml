---
name: FE CI Gatekeeper
on:
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/dev-fe-gatekeeper.yaml"
      - ".github/workflows/dev-fe-browser-tests.yaml"
      - ".github/workflows/dev-fe-e2e.yaml"
    types: [opened, synchronize]

permissions:
  contents: read
  packages: read
  checks: write
  pull-requests: read
  repository-projects: read

env:
  NODE_OPTIONS: "—-max_old_space_size=4096"

jobs:
  cache_pnpm:
    name: Cache PNPM
    strategy:
      fail-fast: true
    continue-on-error: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.4.0

      - name: Use Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install dependencies
        run: cd ui && make init

  CI_checks:
    runs-on: ubuntu-latest
    needs: cache_pnpm
    strategy:
      matrix:
        action: ["lint-check", "format-check", "test", "build"]
      fail-fast: true
    continue-on-error: false
    defaults:
      run:
        working-directory: ui
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          lfs: true
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.4.0

      - name: Use Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - run: make init

      - name: lint-check
        if: matrix.action == 'lint-check'
        run: make lint-check

      - name: format-check
        if: matrix.action == 'format-check'
        run: make format-check

      - name: test
        if: matrix.action == 'test'
        run: |
          pnpm --filter "@percona/ui-lib" test
          pnpm --filter "@percona/everest" test:unit

      - name: build
        if: matrix.action == 'build'
        run: make build

  browser_tests:
    needs: cache_pnpm
    uses: ./.github/workflows/dev-fe-browser-tests.yaml
    secrets: inherit

  permission_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Get User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@c21884f3dda18dafc2f8b402fe807ccc9ec1aa5e # v2.4.0
        with:
          require: write
          username: ${{ github.triggering_actor }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check User Permission
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          exit 1

  merge-gatekeeper:
    needs: [CI_checks, browser_tests, permission_checks]
    name: Merge Gatekeeper
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Run Merge Gatekeeper
        uses: upsidr/merge-gatekeeper@09af7a82c1666d0e64d2bd8c01797a0bcfd3bb5d # v1.2.1
        with:
          self: Merge Gatekeeper
          token: ${{ secrets.GITHUB_TOKEN }}
          interval: 45
          timeout: 600
          ignored: "license/snyk (Percona Github Org), security/snyk (Percona Github Org)"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
